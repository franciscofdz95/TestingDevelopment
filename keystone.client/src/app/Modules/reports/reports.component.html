<div class="container mt-4">
  <h2>Reports</h2>
  <div class="col-md-12">
    <div class="row align-items-center">
   
      <div class="col-md-3 form-group">
        <ng-select [items]="reportList" bindLabel="value" bindValue="id" placeholder="Select a Report"
                   [(ngModel)]="selectedReportID" (change)="selectReport($event)"
                   [clearable]="true" [searchable]="true" class="custom-ng-select">
        </ng-select>
      </div>


      <div class="col-md-2 form-group">
        <button type="submit" class="btn btn-primary btn-sm"
                (click)="loadData()">
          Submit
        </button>
      </div>

      <div class="col-md-2 form-group">
        <button type="button" class="btn btn-success btn-sm"
                (click)="downloadReport()">
          Download
        </button>
      </div>
    </div>
  </div>

  <hr />
  <div class="row" *ngIf="selectedReportID != 0 && selectedReportID != null">
    <div class="col-md-12">
      <ag-grid-angular #reportsGrid
                       style="width: 100%; height: 500px;"
                       class="ag-theme-balham text-end cell-text-align mt-3"
                       [rowData]="rowData"
                       [columnDefs]="columnDefs"
                       [defaultColDef]="{ sortable: true, filter: true }"
                       (gridReady)="onGridReady($event)"
                       [paginationPageSize]="20"
                       [pagination]="pagination"
                       [cacheBlockSize]="paginationPageSize">
      </ag-grid-angular>

    </div>
  </div>
</div>
